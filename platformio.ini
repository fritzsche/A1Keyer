[platformio]
default_envs = esp32s3_cardputer

[env:esp32p4_pioarduino]
; Pin to pioarduino 55.03.35 (Arduino core 3.3.5 / ESP-IDF 5.5.1) to
; avoid the Tab5 MIPI-DSI backlight flicker regression.
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.35
board = esp32-p4-evboard
framework = arduino

; Debugging-Einstellungen
;debug_tool = esp-builtin
;debug_init_break = tbreak setup
;build_type = debug

upload_speed = 1500000
monitor_speed = 115200
build_type = release

board_build.mcu = esp32p4
board_build.flash_mode = qio

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_TAB5
    -DAUDIO_KEEP_WARM=0
    -DLOG_SERIAL=0
    -O3
    -ffunction-sections
    -fdata-sections
    -fno-rtti
    -fno-exceptions
    -funroll-loops
    -ffast-math

lib_deps =
    https://github.com/M5Stack/M5Unified.git
    https://github.com/M5Stack/M5GFX.git

[env:esp32s3_cardputer]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

upload_speed = 1500000
monitor_speed = 115200
build_type = release

build_flags =
    -DBOARD_CARDPUTER
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DAUDIO_KEEP_WARM=0
    -DLOG_SERIAL=0
    -O3
    -ffunction-sections
    -fdata-sections

lib_deps =
    https://github.com/M5Stack/M5GFX.git
    M5Cardputer=https://github.com/m5stack/M5Cardputer

extra_scripts = post:scripts/merge_bin.py


