name: Update latest tag

# On every push of a release tag (vX.Y.Z), force-move the floating `latest`
# ref to the same commit. The webflasher / latest-tag consumer can then
# rely on `latest` always pointing at the most recent tagged release.

on:
  push:
    tags:
      # Only full semver tags (vX.Y.Z) move the `latest` ref.
      # Pre-release tags like v0.2.0-rc1 are intentionally excluded —
      # bump to a final tag (v0.2.0) when you want latest to follow.
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  update-latest:
    name: Move latest tag to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Force-move latest → ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Pinned release tag: ${REF_NAME}"
          echo "Moving 'latest' to ${REF_NAME} (commit ${SHA})"

          # Try to create the ref. If it already exists (HTTP 422 with
          # "Reference already exists"), fall through to the update call.
          create_status=$(curl -sS -o /tmp/create.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/git/refs" \
            -d "{\"ref\":\"refs/tags/latest\",\"sha\":\"${SHA}\"}")

          if [ "$create_status" = "201" ]; then
            echo "Created 'latest' ref."
            exit 0
          fi

          # Inspect the response. If the ref already exists, update it.
          if grep -q 'Reference already exists' /tmp/create.json; then
            echo "Ref exists — updating to ${SHA}."
            curl -fsSL -X PATCH \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/git/refs/tags/latest" \
              -d "{\"sha\":\"${SHA}\"}"
            echo
            echo "Updated 'latest' to ${SHA}."
            exit 0
          fi

          echo "Unexpected response from create (HTTP ${create_status}):"
          cat /tmp/create.json
          exit 1
